<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MsClaw</title>
    <link rel="stylesheet" href="/css/site.css">
</head>
<body>
    <div class="shell">
        <header class="composer">
            <form id="prompt-form" class="prompt-row">
                <label class="sr-only" for="prompt-input">Message</label>
                <textarea id="prompt-input" rows="1" placeholder="Message the mind…" required></textarea>
                <button id="send-button" class="send-btn" type="submit" aria-label="Send">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
                </button>
            </form>
            <nav class="toolbar">
                <div class="status-bar">
                    <span class="dot" id="status-dot"></span>
                    <span id="connection-status">Connecting…</span>
                    <span id="user-email" class="session-label"></span>
                    <span class="toolbar-sep"></span>
                    <span id="session-id" class="session-label">No session</span>
                </div>
                <div class="actions">
                    <button id="create-session" class="btn" type="button">New Session</button>
                    <button id="abort-response" class="btn" type="button" disabled>Abort</button>
                    <button id="clear-chat" class="btn" type="button">Clear</button>
                    <span class="toolbar-sep"></span>
                    <button id="activity-toggle" class="btn btn-icon" type="button" aria-label="Toggle activity log" title="Activity log">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
                    </button>
                </div>
            </nav>
        </header>

        <section id="conversation" class="conversation" aria-live="polite"></section>

        <button id="scroll-btn" class="scroll-btn hidden" type="button" aria-label="Scroll to latest">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 15 12 9 18 15"/></svg>
        </button>
    </div>

    <aside id="activity-drawer" class="drawer">
        <header class="drawer-header">
            <span class="drawer-title">Activity</span>
            <button id="activity-close" class="btn btn-icon" type="button" aria-label="Close">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </header>
        <ol id="activity-log" class="activity-log"></ol>
    </aside>

    <script src="https://cdn.jsdelivr.net/npm/@microsoft/signalr@8.0.7/dist/browser/signalr.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked@15/marked.min.js"></script>
    <script>
        marked.use({ breaks: true, gfm: true });
        const conversation = document.getElementById("conversation");
        const activityLog = document.getElementById("activity-log");
        const promptForm = document.getElementById("prompt-form");
        const promptInput = document.getElementById("prompt-input");
        const sendButton = document.getElementById("send-button");
        const abortButton = document.getElementById("abort-response");
        const createSessionButton = document.getElementById("create-session");
        const clearChatButton = document.getElementById("clear-chat");
        const connectionStatus = document.getElementById("connection-status");
        const sessionIdLabel = document.getElementById("session-id");
        const statusDot = document.getElementById("status-dot");
        const scrollBtn = document.getElementById("scroll-btn");
        const activityToggle = document.getElementById("activity-toggle");
        const activityDrawer = document.getElementById("activity-drawer");
        const activityClose = document.getElementById("activity-close");
        const userEmail = document.getElementById("user-email");

        let activeSubscription = null;
        let activeAssistantMessage = null;
        let authContext = window.__AUTH_CONTEXT;

        // ─── Textarea: auto-resize + Enter to send ───

        promptInput.addEventListener("input", () => {
            promptInput.style.height = "auto";
            promptInput.style.height = Math.min(promptInput.scrollHeight, 120) + "px";
        });

        promptInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                promptForm.requestSubmit();
            }
        });

        // ─── Scroll-to-bottom anchor ───

        conversation.addEventListener("scroll", () => {
            scrollBtn.classList.toggle("hidden", conversation.scrollTop < 40);
        });

        scrollBtn.addEventListener("click", () => scrollConversationToTop());

        // ─── Activity drawer ───

        function toggleDrawer() {
            activityDrawer.classList.toggle("open");
        }

        activityToggle.addEventListener("click", toggleDrawer);
        activityClose.addEventListener("click", toggleDrawer);

        // ─── SignalR connection ───

        const connection = new signalR.HubConnectionBuilder()
            .withUrl("/gateway", {
                accessTokenFactory: () => authContext?.accessToken ?? ""
            })
            .withAutomaticReconnect()
            .configureLogging(signalR.LogLevel.Information)
            .build();

        connection.onreconnecting(() => {
            setConnectionStatus("Reconnecting…", "err");
            appendActivity("Connection lost. Reconnecting…", "warning");
        });

        connection.onreconnected(() => {
            setConnectionStatus("Connected", "ok");
            appendActivity("Connection restored.", "success");
        });

        connection.onclose((error) => {
            setConnectionStatus("Disconnected", "err");
            if (error) {
                appendActivity(`Connection closed: ${error.message}`, "error");
            }
            setRunActive(false);
        });

        connection.on("ReceiveAuthContext", (nextAuthContext) => {
            if (!nextAuthContext || !nextAuthContext.authenticated) {
                return;
            }

            authContext = nextAuthContext;
            userEmail.textContent = authContext.username ?? "Authenticated user";
            appendActivity(`Token refreshed. Expires at ${authContext.expiresAtUtc ?? "unknown"}.`, "success");
        });

        // ─── Send message ───

        promptForm.addEventListener("submit", async (event) => {
            event.preventDefault();
            const prompt = promptInput.value.trim();
            if (!prompt) return;

            try {
                await ensureConnected();
                appendMessage("user", prompt);
                activeAssistantMessage = appendMessage("assistant", "");
                appendActivity("Run started.", "info");
                promptInput.value = "";
                promptInput.style.height = "auto";
                setRunActive(true);

                activeSubscription = connection.stream("SendMessage", prompt).subscribe({
                    next: (sessionEvent) => handleSessionEvent(sessionEvent),
                    complete: () => {
                        appendActivity("Run complete.", "success");
                        finalizeAssistantMessage();
                        setRunActive(false);
                    },
                    error: (error) => {
                        appendActivity(`Run failed: ${error.message}`, "error");
                        if (activeAssistantMessage && !activeAssistantMessage.textContent.trim()) {
                            activeAssistantMessage.textContent = "The run failed before any assistant text was returned.";
                        }
                        setRunActive(false);
                    }
                });
            } catch (error) {
                appendActivity(`Unable to send prompt: ${error.message}`, "error");
                setRunActive(false);
            }
        });

        // ─── Abort ───

        abortButton.addEventListener("click", async () => {
            try {
                await ensureConnected();
                await connection.invoke("AbortResponse");
                if (activeSubscription) activeSubscription.dispose();
                appendActivity("Abort requested.", "warning");
            } catch (error) {
                appendActivity(`Abort failed: ${error.message}`, "error");
            } finally {
                setRunActive(false);
            }
        });

        // ─── New session ───

        createSessionButton.addEventListener("click", async () => {
            try {
                await ensureConnected();
                const sessionId = await connection.invoke("CreateSession");
                sessionIdLabel.textContent = sessionId;
                appendActivity(`Created session ${sessionId}.`, "info");
            } catch (error) {
                appendActivity(`Create session failed: ${error.message}`, "error");
            }
        });

        // ─── Clear ───

        clearChatButton.addEventListener("click", () => {
            conversation.innerHTML = "";
            activityLog.innerHTML = "";
            activeAssistantMessage = null;
        });

        // ─── Initialize ───

        void initialize();

        async function initialize() {
            try {
                if (!authContext || !authContext.authenticated) {
                    throw new Error("Run `msclaw auth login` before opening the gateway UI.");
                }
                userEmail.textContent = authContext.username ?? "Authenticated user";
                appendActivity(`Signed in as ${userEmail.textContent}.`, "success");
                await ensureConnected();
                appendActivity("Console ready.", "success");
            } catch (error) {
                setConnectionStatus("Not signed in", "err");
                userEmail.textContent = "Not signed in";
                appendActivity(`Initialization failed: ${error.message}`, "error");
                sendButton.disabled = true;
                createSessionButton.disabled = true;
                abortButton.disabled = true;
                promptInput.disabled = true;
                clearChatButton.disabled = true;
            }
        }

        async function ensureConnected() {
            if (connection.state === signalR.HubConnectionState.Connected) return;
            setConnectionStatus("Connecting…");
            await connection.start();
            setConnectionStatus("Connected", "ok");
        }

        // ─── Event handling ───

        function handleSessionEvent(sessionEvent) {
            const eventType = readValue(sessionEvent, "type", "Type") ?? "";
            const data = sessionEvent?.data ?? sessionEvent?.Data ?? {};
            const fullContent = readValue(data, "content", "Content");
            const message = readValue(data, "message", "Message");
            const errorType = readValue(data, "errorType", "ErrorType");

            const isNoise = eventType === "session.idle"
                || eventType === "pending_messages.modified"
                || eventType === "session.usage_info"
                || eventType === "assistant.usage"
                || eventType === "assistant.streaming_delta"
                || eventType.includes("delta");

            if (!isNoise) {
                appendActivity(eventType || "event", "info", sessionEvent);
            }

            if (eventType === "assistant.message" && typeof fullContent === "string" && fullContent.length > 0) {
                activeAssistantMessage.innerHTML = marked.parse(fullContent);
                scrollConversationToTop();
                return;
            }

            if (typeof message === "string" && message.length > 0 && typeof errorType === "string") {
                appendActivity(`Runtime error: ${message}`, "error");
                if (activeAssistantMessage) {
                    activeAssistantMessage.textContent = message;
                }
            }
        }

        function finalizeAssistantMessage() {
            if (activeAssistantMessage && !activeAssistantMessage.textContent.trim()) {
                activeAssistantMessage.textContent = "No assistant text was returned for this run.";
            }
            activeAssistantMessage = null;
            activeSubscription = null;
        }

        // ─── UI helpers ───

        function setRunActive(isActive) {
            sendButton.disabled = isActive;
            abortButton.disabled = !isActive;
            createSessionButton.disabled = isActive;
        }

        function setConnectionStatus(text, dotState) {
            connectionStatus.textContent = text;
            statusDot.className = "dot" + (dotState ? ` ${dotState}` : "");
        }

        function appendMessage(role, text) {
            const bubble = document.createElement("div");
            bubble.className = `bubble bubble-${role}`;

            const content = document.createElement("div");
            content.className = "bubble-content";

            if (role === "assistant" && !text) {
                content.innerHTML = '<span class="typing-indicator"><span></span><span></span><span></span></span>';
            } else {
                content.textContent = text;
            }

            bubble.appendChild(content);
            conversation.prepend(bubble);
            scrollConversationToTop();

            return content;
        }

        function appendActivity(text, tone, jsonData) {
            const item = document.createElement("li");
            item.className = `activity activity-${tone}`;

            const header = document.createElement("div");
            header.className = "activity-header";

            const time = document.createElement("span");
            time.className = "activity-time";
            time.textContent = new Date().toLocaleTimeString("en-US", { hour12: false });

            const label = document.createElement("span");
            label.className = "activity-label";
            label.textContent = text;

            header.append(time, label);
            item.appendChild(header);

            if (jsonData) {
                const pre = document.createElement("pre");
                pre.className = "activity-json";
                pre.textContent = JSON.stringify(jsonData, null, 2);
                pre.hidden = true;
                item.appendChild(pre);
                header.style.cursor = "pointer";
                header.addEventListener("click", () => { pre.hidden = !pre.hidden; });
            }

            activityLog.appendChild(item);
            item.scrollIntoView({ block: "nearest" });
        }

        function readValue(source, ...keys) {
            for (const key of keys) {
                if (Object.prototype.hasOwnProperty.call(source, key)) return source[key];
            }
            return undefined;
        }

        function scrollConversationToTop() {
            conversation.scrollTop = 0;
        }
    </script>
</body>
</html>
