name: NuGet Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build
        run: dotnet build src/MsClaw.slnx --nologo -c Release

      - name: Test
        run: |
          dotnet test src/MsClaw.Core.Tests/MsClaw.Core.Tests.csproj --nologo -c Release --no-build --filter "FullyQualifiedName!~MsClawClientFactoryTests"
          dotnet test src/MsClaw.Gateway.Tests/MsClaw.Gateway.Tests.csproj --nologo -c Release --no-build

      - name: Pack
        run: |
          dotnet pack src/MsClaw.Core/MsClaw.Core.csproj -c Release -o ./nupkg --no-build
          dotnet pack src/MsClaw.Gateway/MsClaw.Gateway.csproj -c Release -o ./nupkg --no-build

      - name: Push to NuGet
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${{ github.ref_name }}" --generate-notes
