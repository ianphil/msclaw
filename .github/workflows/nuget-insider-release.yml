name: NuGet Insider Release

on:
  push:
    branches: [insider]

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Set insider version
        id: version
        run: echo "version=0.1.0-insider.$(date +%Y%m%d%H%M%S)" >> "$GITHUB_OUTPUT"

      - name: Build and test
        run: dotnet test src/MsClaw.slnx --nologo -c Release

      - name: Pack
        run: |
          dotnet pack src/MsClaw.Core/MsClaw.Core.csproj -c Release -o ./nupkg --no-build -p:Version=${{ steps.version.outputs.version }}
          dotnet pack src/MsClaw.Gateway/MsClaw.Gateway.csproj -c Release -o ./nupkg --no-build -p:Version=${{ steps.version.outputs.version }}

      - name: Push to GitHub Packages
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.GITHUB_TOKEN }} --source https://nuget.pkg.github.com/ianphil/index.json --skip-duplicate
